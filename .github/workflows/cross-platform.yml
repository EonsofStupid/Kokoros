name: Cross-Platform Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Tell espeak-rs-sys to build espeak-ng with the static CRT on Windows.
  # Harmless on Linux/macOS (the MSVC runtime flag is never applied there).
  ESPEAK_STATIC_CRT: "1"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Linux
  # ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq -y \
            pkg-config \
            libssl-dev \
            clang \
            libclang-dev \
            cmake \
            libsonic-dev \
            libpcaudio-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Build (release)
        run: cargo build --release

      - name: Build with CUDA feature (compile-check only)
        run: cargo build --release --features cuda -p kokoros
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────────
  # macOS
  # ─────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (x86_64)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: brew install cmake llvm pkg-config

      - name: Export LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Build (release)
        run: cargo build --release

  # ─────────────────────────────────────────────────────────────────────────────
  # Windows – x86_64-pc-windows-msvc with static CRT (/MT)
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (x86_64-pc-windows-msvc)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM / clang (required by espeak-rs bindgen)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"

      - name: Export LIBCLANG_PATH
        shell: pwsh
        run: |
          $llvmBin = (Get-Command clang).Source | Split-Path
          "LIBCLANG_PATH=$llvmBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Rust stable + MSVC target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build (release, MSVC static CRT)
        # ESPEAK_STATIC_CRT is set at the workflow level.
        # .cargo/config.toml enforces +crt-static for the MSVC target.
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Verify – static CRT (must NOT import VCRUNTIME140.dll)
        shell: pwsh
        run: |
          $exe = "target\x86_64-pc-windows-msvc\release\koko.exe"
          $deps = dumpbin /dependents $exe
          Write-Output $deps
          if ($deps -match "VCRUNTIME140\.dll" -or $deps -match "MSVCP140\.dll") {
            Write-Error "Binary links the dynamic CRT – static CRT requirement not met!"
            exit 1
          }
          Write-Output "OK: static CRT verified."

      - name: Verify – ORT is NOT statically linked
        shell: pwsh
        run: |
          $exe = "target\x86_64-pc-windows-msvc\release\koko.exe"
          $imports = dumpbin /imports $exe
          if ($imports -match "onnxruntime") {
            Write-Error "onnxruntime appears in static imports – load-dynamic may not be active!"
            exit 1
          }
          Write-Output "OK: onnxruntime.dll is not statically linked."
